# Generated by scripts/migrate_to_poly.py from .pre-commit-config.yaml + tool configs. Review before committing.

# discovery-exclude (pending polylint feature): direct `poly lint .`/`poly fmt .` does not yet honor these; they apply
# to the hook builtins below. Globs:
#   **/*.lock
#   **/Cargo.lock
#   **/go.sum
#   **/package-lock.json
#   **/pnpm-lock.yaml
#   **/uv.lock

[defaults]
line_length = 120
line_ending = "lf"
final_newline = true
trim_trailing_whitespace = true

[hooks]
stages = ["pre-commit"]

[hooks.builtin]
# Formula/*.rb are Homebrew formulas: they follow Homebrew DSL idiom (`url "..."`
# without parens, EOS heredocs, etc.) and are audited by `brew style`, not poly's
# generic rubocop. Exclude them so the hooks don't rewrite them into non-idiomatic
# Ruby that `brew audit` would then reject.
lint = { exclude = [
    "**/*.lock",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
    "Formula/**",
] }
fmt = { exclude = [
    "**/*.lock",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
    "Formula/**",
] }
commit = { stages = ["commit-msg"] }
file_safety = { exclude = [
    "**/*.lock",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
] }

# --- catalog tools (standalone binaries, PATH-probed) ---
[tools.rubocop]
enabled = true

[tools.shfmt]
enabled = true

[tools.shellcheck]
enabled = true

[tools.actionlint]
enabled = true
