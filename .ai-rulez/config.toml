# AI-Rulez Configuration (migrated to V4 TOML format)
# Documentation: https://github.com/Goldziher/ai-rulez

version = '4.0'
name = 'homebrew-tap'
description = 'Homebrew tap with formulas for xberg-io CLI tools'
gitignore = true
presets = ['claude', 'codex', 'copilot', 'cursor', 'antigravity']
builtins = ['ruby', 'default-commands']

compact = true
[[includes]]
name = 'xberg-core'
source = 'https://github.com/xberg-io/agent-conventions.git'
path = 'modules/core'
merge_strategy = 'local-override'
